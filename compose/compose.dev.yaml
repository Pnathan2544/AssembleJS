# compose/compose.dev.yaml
# ---------------------------------------------------------------------------
# Development overlay.
# Usage (from repo root):
#   docker compose -f compose/compose.yaml -f compose/compose.dev.yaml up --build
# Or: make dev
# ---------------------------------------------------------------------------

services:

  mongo:
    # Expose for local DB GUI tools (Compass, DataGrip, etc.)
    ports:
      - "27017:27017"

  redis:
    # Expose for redis-cli / RedisInsight
    ports:
      - "6379:6379"

  api:
    build:
      additional_contexts:
        node-api-base: docker-image://node-api-base:local
    environment:
      NODE_ENV: development
    # Hot reload via Node's built-in --watch (Node 18+, no devDependency needed)
    command: ["node", "--watch", "src/app.js"]
    volumes:
      # Bind-mount source for hot reload
      - ../apps/api/src:/app/src:ro
    ports:
      - "3000:3000"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # Vite dev server – hot reload for React (dev mode only)
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      additional_contexts:
        node-web-base: docker-image://node-web-base:local
    environment:
      NODE_ENV: development
    volumes:
      - ../apps/web/src:/app/src:ro
      - ../apps/web/index.html:/app/index.html:ro
      - ../apps/web/vite.config.js:/app/vite.config.js:ro
    ports:
      - "5173:5173"
    networks:
      - edge

  nginx:
    build:
      additional_contexts:
        node-web-base: docker-image://node-web-base:local
    # Bind-mount nginx config so you can iterate without rebuilding
    volumes:
      - ../docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
